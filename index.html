<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Enosoft Project Management System - Admin Dashboard"
    />
    <title>Enosoft Project Management System</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <header>
      <h1>Enosoft Project Management System</h1>
    </header>

    <nav>
      <button data-section="employees" class="nav-btn active">Employees</button>
      <button data-section="projects" class="nav-btn">Projects</button>
      <button data-section="tasks" class="nav-btn">Tasks</button>
    </nav>

    <main>
      <section id="employees-section" class="section active">
        <div class="section-header">
          <h2>Employees</h2>
          <button
            data-action="create"
            data-entity="employee"
            class="btn-primary"
          >
            Add Employee
          </button>
        </div>
        <div id="employees-list" class="data-list"></div>
      </section>

      <section id="projects-section" class="section">
        <div class="section-header">
          <h2>Projects</h2>
          <button
            data-action="create"
            data-entity="project"
            class="btn-primary"
          >
            Add Project
          </button>
        </div>
        <div id="projects-list" class="data-list"></div>
      </section>

      <section id="tasks-section" class="section">
        <div class="section-header">
          <h2>Tasks</h2>
          <button data-action="create" data-entity="task" class="btn-primary">
            Add Task
          </button>
        </div>
        <div id="tasks-list" class="data-list"></div>
      </section>
    </main>

    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-header">
          <h3 id="modal-title">Modal Title</h3>
          <button id="modal-close" class="btn-close">&times;</button>
        </div>
        <div class="modal-body">
          <form id="modal-form"></form>
        </div>
      </div>
    </div>

    <div id="notification" class="notification hidden"></div>

    <button id="fab-button" class="fab-button" aria-label="Open chat">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"
        />
      </svg>
    </button>

    <div id="chat-modal-overlay" class="chat-modal-overlay hidden">
      <div class="chat-modal">
        <div class="chat-modal-header">
          <h3>AI Chat Assistant</h3>
          <button
            id="chat-modal-close"
            class="chat-modal-close"
            aria-label="Close chat"
          >
            &times;
          </button>
        </div>
        <div class="chat-responsive-container">
          <div class="chat-message-list-container"></div>
          <div class="chat-input-container"></div>
        </div>
      </div>
    </div>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
