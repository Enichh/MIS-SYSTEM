[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/next"

[build.environment]
  NEXT_PUBLIC_SUPABASE_URL = "https://your-project.supabase.co"
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY = "your-anon-key"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
