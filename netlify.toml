[build]
  command = "echo 'No build step required for vanilla JS'"
  publish = "."

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[dev]
  command = "echo 'Dev server ready'"
  port = 3000
